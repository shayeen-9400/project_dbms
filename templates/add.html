<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Student — Smart Student Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <div class="nav-brand-icon"><i class="fas fa-graduation-cap"></i></div>
            <span class="nav-brand-text">Smart<span>Student</span></span>
        </a>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/add" class="active">Add Student</a></li>
        </ul>
        <div class="nav-actions">
            <a href="/" class="btn btn-secondary btn-sm" id="back-btn">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>
    </nav>

    <section class="form-section">
        <div class="form-card">
            <div class="form-card-header">
                <h2>
                    <div class="icon-wrap"><i class="fas fa-user-plus"></i></div>
                    Add New Student
                </h2>
                <p>Fill in the details below to register a new student.</p>
            </div>
            <form id="add-form" novalidate>
                <div class="form-group">
                    <label for="name"><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="name" name="name" placeholder="e.g. Shaheen Zubair" required autocomplete="off" />
                </div>
                <div class="form-group">
                    <label for="roll_number"><i class="fas fa-id-badge"></i> Roll Number</label>
                    <input type="text" id="roll_number" name="roll_number" placeholder="e.g. CS-2024-001" required autocomplete="off" />
                </div>
                <div class="form-group">
                    <label for="department"><i class="fas fa-building"></i> Department</label>
                    <select id="department" name="department" required>
                        <option value="" disabled selected>— Select Department —</option>
                        {% for dept in departments %}
                        <option value="{{ dept }}">{{ dept }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="marks"><i class="fas fa-star"></i> Marks (out of 100)</label>
                    <input type="number" id="marks" name="marks" placeholder="0 – 100" min="0" max="100" step="0.1" required />
                    <p class="marks-hint">
                        <i class="fas fa-info-circle"></i>
                        Grades: <strong>A+</strong> ≥90 · <strong>A</strong> ≥80 · <strong>B</strong> ≥70 · <strong>C</strong> ≥60 · <strong>D</strong> ≥50 · <strong>F</strong> &lt;50
                    </p>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="submit-add-btn">
                    <i class="fas fa-plus"></i> Add Student
                </button>
            </form>
        </div>
    </section>

    <div id="toast-container"></div>
    <script src="/static/script.js"></script>
</body>
</html>
