<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Student — Smart Student Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

    <!-- ========== NAVBAR ========== -->
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <i class="fas fa-graduation-cap"></i>
            <span>Student Manager</span>
        </a>
        <a href="/" class="btn btn-secondary" id="back-btn">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </nav>

    <!-- ========== ADD FORM ========== -->
    <section class="form-section">
        <div class="form-card">
            <h2><i class="fas fa-user-plus"></i> Add New Student</h2>
            <form id="add-form">
                <div class="form-group">
                    <label for="name"><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter student name" required />
                </div>
                <div class="form-group">
                    <label for="roll_number"><i class="fas fa-id-badge"></i> Roll Number</label>
                    <input type="text" id="roll_number" name="roll_number" placeholder="Enter roll number" required />
                </div>
                <div class="form-group">
                    <label for="department"><i class="fas fa-building"></i> Department</label>
                    <input type="text" id="department" name="department" placeholder="Enter department" required />
                </div>
                <div class="form-group">
                    <label for="marks"><i class="fas fa-star"></i> Marks</label>
                    <input type="number" id="marks" name="marks" placeholder="Enter marks" min="0" max="100" required />
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="submit-add-btn">
                    <i class="fas fa-save"></i> Save Student
                </button>
            </form>
        </div>
    </section>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script src="/static/script.js"></script>
</body>
</html>
