<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Student — Smart Student Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

    <!-- ========== NAVBAR ========== -->
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <i class="fas fa-graduation-cap"></i>
            <span>Student Manager</span>
        </a>
        <a href="/" class="btn btn-secondary" id="back-btn">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </nav>

    <!-- ========== EDIT FORM ========== -->
    <section class="form-section">
        <div class="form-card">
            <h2><i class="fas fa-user-edit"></i> Edit Student</h2>
            <!-- student._id is passed from Flask/Jinja2 -->
            <form id="edit-form" data-id="{{ student._id }}" novalidate>
                <div class="form-group">
                    <label for="name"><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="name" name="name" value="{{ student.name }}" required />
                </div>
                <div class="form-group">
                    <label for="roll_number"><i class="fas fa-id-badge"></i> Roll Number</label>
                    <input type="text" id="roll_number" name="roll_number" value="{{ student.roll_number }}" required />
                </div>
                <div class="form-group">
                    <label for="department"><i class="fas fa-building"></i> Department</label>
                    <select id="department" name="department" required>
                        <option value="" disabled>— Select Department —</option>
                        {% for dept in departments %}
                        <option value="{{ dept }}" {% if dept == student.department %}selected{% endif %}>{{ dept }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="marks"><i class="fas fa-star"></i> Marks</label>
                    <input type="number" id="marks" name="marks" value="{{ student.marks }}" min="0" max="100" step="0.1" required />
                    <p class="marks-hint">Enter marks between 0 and 100. Grades: A+ ≥90 · A ≥80 · B ≥70 · C ≥60 · D ≥50 · F &lt;50</p>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="submit-edit-btn">
                    <i class="fas fa-save"></i> Update Student
                </button>
            </form>
        </div>
    </section>

    <!-- Toast container -->
    <div id="toast-container"></div>
    <script src="/static/script.js"></script>
</body>
</html>
